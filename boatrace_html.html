function lookup(venue,course,diff){
  const tables=VENUE_TABLES[venue]??DEFAULT_TABLES;
  for(const[lo,hi,w1,w2,w3,top3]of tables[course]){
    if(diff>=lo&&diff<hi)return{w1,w2,w3,top3};
  }
  return{w1:0,w2:0,w3:0,top3:0};
}

function App(){

  const[inputs,setInputs]=useState({1:empty(),2:empty(),3:empty(),4:empty(),5:empty(),6:empty()});
  const[kimariCount,setKimariCount]=useState(null);

  const setPText=(k,v)=>setPTexts(p=>({...p,[k]:v}));
  const setPMsg=(k,v)=>setPMsgs(p=>({...p,[k]:v}));
  const setCourse=(boat,c)=>setCourses(p=>({...p,[boat]:Number(c)}));
  const set=(boat,key,v)=>setInputs(p=>({...p,[boat]:{...p[boat],[key]:v}}));
  const setSt=(b,v)=>setSts(p=>({...p,[b]:v}));
  const toggleF=(b)=>setFHold(p=>({...p,[b]:!p[b]}));
  const setFSt=(b,v)=>setFSts(p=>({...p,[b]:v}));
  const setTilt=(b,v)=>setTilts(p=>({...p,[b]:v}));
  const setWeight=(b,v)=>setWeights(p=>({...p,[b]:v}));

  const makeRowReader=(text)=>{
    let cursor=0;
    return(label,{allowDash=false}={})=>{
      const i=text.indexOf(label,cursor);
      if(i===-1)return null;
      const pos=i+label.length;
      const seg=text.slice(pos);
      const re=allowDash?/-?(?:\d+\.\d+|\.\d+)|[-−ー]|\d+/g:/-?(?:\d+\.\d+|\.\d+|\d+)/g;
      const vals=[];let m,lastEnd=0;
      while(vals.length<6&&(m=re.exec(seg))){
        if(allowDash&&/^[-−ー]$/.test(m[0]))vals.push(null);
        else vals.push(Number(m[0]));
        lastEnd=re.lastIndex;
      }
      if(vals.length<6)return null;
      cursor=pos+lastEnd;
      return vals;
    };
  };

  const applyStTable=(table,period)=>{
    const row=table[period];
    if(row){
      const ns={};
      for(let b=1;b<=6;b++){
        const v=row[b-1];
        if(v!=null&&v>=0&&v<=0.6)ns[b]=Math.min(0.4,v).toFixed(2);
      }
      if(Object.keys(ns).length>0)setSts(p=>({...p,...ns}));
    }
    const f=table["F持"];
    if(f){
      const nf={};
      for(let b=1;b<=6;b++){
        const v=f[b-1];
        nf[b]=(v!=null&&v>=0&&v<=0.6)?Math.min(0.4,v).toFixed(2):"";
      }
      setFSts(nf);
    }
  };

  const parseTenji=()=>{
    setPMsg("tenji","");
    try{
      const text=pTexts.tenji;
      const readRow=makeRowReader(text);
      const shinnyu=readRow("進入",{allowDash:true});
      const tenjiRow=readRow("展示",{allowDash:true});
      const isshuRow=readRow("周回",{allowDash:true});
      const mawariRow=readRow("周り足",{allowDash:true});
      const chokusenRow=readRow("直線",{allowDash:true});
      readRow("ST",{allowDash:true});
      const weightRow=readRow("体重",{allowDash:true});
      readRow("調整重量",{allowDash:true});
      const tiltRow=readRow("チルト",{allowDash:true});
      if(tenjiRow&&isshuRow&&mawariRow){
        const tiltSet=TILT_OPTIONS.map(Number);
        const newTilts={},newWeights={};
        setInputs(prev=>{
          const next={...prev};
          for(let b=1;b<=6;b++){
            const i=b-1;
            next[b]={
              tenji:tenjiRow[i]>=5.5&&tenjiRow[i]<=7.8?String(tenjiRow[i]):prev[b].tenji,
              isshu:isshuRow[i]>=15&&isshuRow[i]<=45?String(isshuRow[i]):prev[b].isshu,
              mawari:mawariRow[i]>=4.5&&mawariRow[i]<=15?String(mawariRow[i]):prev[b].mawari,
              chokusen:chokusenRow&&chokusenRow[i]!=null&&chokusenRow[i]>=5.5&&chokusenRow[i]<=8.5?String(chokusenRow[i]):prev[b].chokusen,
            };
          }
          return next;
        });
        if(shinnyu&&shinnyu.every(v=>v>=1&&v<=6&&Number.isInteger(v))){
          const c={};
          for(let b=1;b<=6;b++)c[b]=shinnyu[b-1];
          setCourses(c);
        }
        if(weightRow){
          for(let b=1;b<=6;b++){
            const v=weightRow[b-1];
            if(v>=40&&v<=70)newWeights[b]=String(v);
          }
          if(Object.keys(newWeights).length>0)setWeights(p=>({...p,...newWeights}));
        }
        if(tiltRow){
          for(let b=1;b<=6;b++){
            if(tiltRow[b-1]==null)continue;
            const snapped=(Math.round(tiltRow[b-1]*2)/2).toFixed(1);
            if(TILT_OPTIONS.includes(snapped))newTilts[b]=snapped;
          }
          if(Object.keys(newTilts).length>0)setTilts(p=>({...p,...newTilts}));
        }
        setPMsg("tenji","✓ 6艇分を読み取りました");return;
      }
      const tokens=(text.match(/-?(?:\d+\.\d+|\.\d+|\d+)/g)||[]).map(Number);
      const anchors=[];
      tokens.forEach((v,i)=>{if(v>=30&&v<=45&&anchors.length<6)anchors.push(i);});
      if(anchors.length===0){setPMsg("tenji","タイムが見つかりません");return;}
      const tiltSet=TILT_OPTIONS.map(Number);
      const newInputs={},newTilts={};
      anchors.forEach((idx,k)=>{
        const b=k+1;
        const isshu=tokens[idx];
        let mawari=null;
        if(tokens[idx+1]!=null&&tokens[idx+1]>=4.5&&tokens[idx+1]<=8.5)mawari=tokens[idx+1];
        let tenji=null;
        if(tokens[idx+3]!=null&&tokens[idx+3]>=5.5&&tokens[idx+3]<=7.8)tenji=tokens[idx+3];
        let tilt=null;
        for(let j=idx-1;j>=Math.max(0,idx-4);j--){
          if(tiltSet.includes(tokens[j])){tilt=tokens[j];break;}
        }
        newInputs[b]={tenji:tenji!=null?String(tenji):"",isshu:String(isshu),mawari:mawari!=null?String(mawari):""};
        if(tilt!=null)newTilts[b]=tilt.toFixed(1);
      });
      setInputs(prev=>{
        const next={...prev};
        for(const b of Object.keys(newInputs)){
          next[b]={tenji:newInputs[b].tenji||prev[b].tenji,isshu:newInputs[b].isshu||prev[b].isshu,mawari:newInputs[b].mawari||prev[b].mawari,chokusen:prev[b].chokusen};
        }
        return next;
      });
      if(Object.keys(newTilts).length>0)setTilts(p=>({...p,...newTilts}));
      setPMsg("tenji",`✓ ${anchors.length}艇分を読み取りました`);
    }catch(e){setPMsg("tenji","解析に失敗しました");}
  };

  const parseStPaste=()=>{
    setPMsg("st","");
    try{
      const text=pTexts.st;
      const table={};
      for(const lb of[...ST_PERIODS,"F持"]){
        const i=text.indexOf(lb);
        if(i===-1){table[lb]=null;continue;}
        const pos=i+lb.length;
        const seg=text.slice(pos);
        const re=/\d+\.\d+|\.\d+|[-−ー]/g;
        const vals=[];let m;
        while(vals.length<6&&(m=re.exec(seg)))vals.push(/^[-−ー]$/.test(m[0])?null:Number(m[0]));
        table[lb]=vals.length===6?vals:null;
      }
      if(ST_PERIODS.some(p=>table[p])){
        setStTable(table);applyStTable(table,stPeriod);
        setPMsg("st","✓ 平均ST表を読み取りました");
      }else{setPMsg("st","平均ST表が見つかりません");}
    }catch(e){setPMsg("st","解析に失敗しました");}
  };

  const parseRacer=()=>{
    setPMsg("racer","");
    try{
      const text=pTexts.racer;
      const sectionText=(label,nextLabels)=>{
        const i=text.indexOf(label);
        if(i===-1)return null;
        let end=text.length;
        for(const nl of nextLabels){const j=text.indexOf(nl,i+label.length);if(j!==-1)end=Math.min(end,j);}
        return text.slice(i+label.length,end);
      };
      const parseSection=(sec)=>{
        if(sec==null)return null;
        const row=(labels)=>{
          for(const label of labels){
            let from=0;
            while(true){
              const i=sec.indexOf(label,from);
              if(i===-1)break;
              const pos=i+label.length;
              const seg=sec.slice(pos);
              const re=/\d+\.\d+|[-−ー]/g;
              const vals=[];let m;
              while(vals.length<6&&(m=re.exec(seg)))vals.push(/^[-−ー]$/.test(m[0])?null:Number(m[0]));
              if(vals.length===6)return vals;
              from=pos;
            }
          }
          return null;
        };
        const recentRow=(num,isYear=false)=>{
          let from=0;
          while(true){
            const i=sec.indexOf("直近",from);
            if(i===-1)break;
            const after=sec.slice(i+2);
            const mm=after.match(/^[\s　]*(\d)(年|ヶ月)?/);
            if(mm){
              const n=Number(mm[1]),unit=mm[2]||"";
              const match=isYear?(n===num&&unit==="年"):(n===num&&unit!=="年");
              if(match){
                const pos=i+2+mm.index+mm[0].length;
                const seg=sec.slice(pos);
                const re=/\d+\.\d+|[-−ー]/g;
                const vals=[];let m;
                while(vals.length<6&&(m=re.exec(seg)))vals.push(/^[-−ー]$/.test(m[0])?null:Number(m[0]));
                if(vals.length===6)return vals;
              }
            }
            from=i+2;
          }
          return null;
        };
        return{
          "今期":row(["今期"]),"直近1年":recentRow(1,true),"直近6ヶ月":recentRow(6),
          "直近3ヶ月":recentRow(3),"直近1ヶ月":recentRow(1),"当地":row(["当地"]),
          "一般戦":row(["一般戦"]),"SG/G1":row(["SG"]),"女子戦":row(["女子戦"]),
        };
      };
      const s1=sectionText("1着率",["2連対率","3連対率"]);
      const s2=sectionText("2連対率",["3連対率"]);
      const s3=sectionText("3連対率",[]);
      if(!s1&&!s2&&!s3){setPMsg("racer","1着率〜3連対率が見つかりません");return;}
      const win1=parseSection(s1);
      const ren2raw=parseSection(s2);
      const adjustRen2=(sec,w1sec)=>{
        if(!sec)return sec;
        const out={};
        for(const k of RACER_CATS){
          const r2=sec[k],r1=w1sec?.[k];
          if(r2==null){out[k]=null;continue;}
          out[k]=r2.map((v,i)=>{const w=r1?.[i];return(v!=null&&w!=null)?Math.max(0,+(v-w).toFixed(1)):v;});
        }
        return out;
      };
      const adjustRen3=(sec,r2sec)=>{
        if(!sec)return sec;
        const out={};
        for(const k of RACER_CATS){
          const r3=sec[k],r2=r2sec?.[k];
          if(r3==null){out[k]=null;continue;}
          out[k]=r3.map((v,i)=>{const w=r2?.[i];return(v!=null&&w!=null)?Math.max(0,+(v-w).toFixed(1)):v;});
        }
        return out;
      };
      const ren2=adjustRen2(ren2raw,win1);
      const ren3raw=parseSection(s3);
      const ren3=adjustRen3(ren3raw,ren2raw);
      const clean=(sec)=>{
        const out={};
        for(const k of RACER_CATS){const arr=sec?sec[k]:null;out[k]=arr?arr.map(v=>(v!=null&&v>=0&&v<=100?v:null)):null;}
        return out;
      };
      const stats={win1:clean(win1),ren2:clean(ren2),ren3:clean(ren3)};
      if(!RACER_CATS.some(k=>stats.win1[k]||stats.ren2[k]||stats.ren3[k])){setPMsg("racer","成績を読み取れませんでした");return;}
      setRacerStats(stats);
      try{
        const i6=text.indexOf("直近6ヶ月");
        if(i6!==-1){
          const seg=text.slice(i6);
          const re=/\((\d+)\)/g;
          const counts=[];let m;
          while(counts.length<6&&(m=re.exec(seg)))counts.push(Number(m[1]));
          if(counts.length===6)setRacerRaceCount(counts);
        }
      }catch(_){}
      setPMsg("racer","✓ 枠別成績を読み取りました");
    }catch(e){setPMsg("racer","解析に失敗しました");}
  };

  const parseMotor=()=>{
    setPMsg("motor","");
    try{
      const text=pTexts.motor;
      const readRow=makeRowReader(text);
      const noRow=readRow("番号");
      readRow("ランク");readRow("貢献P");
      const rateRow=readRow("勝率");
      const win1Row=readRow("1着率");
      const ren2Row=readRow("2連対率");
      const ren3Row=readRow("3連対率");
      if(!rateRow&&!ren2Row){setPMsg("motor","モーター表が見つかりません");return;}
      const nm={};
      for(let b=1;b<=6;b++){
        const i=b-1;
        nm[b]={
          no:noRow&&Number.isInteger(noRow[i])&&noRow[i]>=1&&noRow[i]<=99?noRow[i]:null,
          rate:rateRow&&rateRow[i]>=0&&rateRow[i]<=10?rateRow[i]:null,
          win1:win1Row&&win1Row[i]>=0&&win1Row[i]<=100?win1Row[i]:null,
          ren2:ren2Row&&ren2Row[i]>=0&&ren2Row[i]<=100?ren2Row[i]:null,
          ren3:ren3Row&&ren3Row[i]>=0&&ren3Row[i]<=100?ren3Row[i]:null,
        };
      }
      setMotors(nm);
      setPMsg("motor","✓ モーター情報を読み取りました");
    }catch(e){setPMsg("motor","解析に失敗しました");}
  };

  const parseKimari=()=>{
    setPMsg("kimari","");
    try{
      const text=pTexts.kimari;
      const readN=(seg,n)=>{
        if(seg==null)return null;
        const m=seg.match(/\d+\.\d+/g);
        return m&&m.length>=n?m.slice(0,n).map(Number):null;
      };
      let nige=null;
      const simIdx=text.indexOf("逃げシミュレーション");
      if(simIdx!==-1){
        const simEnd=text.indexOf("決まり手",simIdx);
        const sim=text.slice(simIdx,simEnd===-1?text.length:simEnd);
        const after=(label)=>{const i=sim.indexOf(label);return i===-1?null:sim.slice(i+label.length);};
        const head=readN(after("逃がし2着率"),7);
        const third=readN(after("逃がし3着率"),5);
        const deme=readN(after("出目確率"),5);
        if(head)nige={win1:head[0],nigeRate:head[1],second:head.slice(2),third,deme};
      }
      const parseKim=(seg)=>{
        if(seg==null)return null;
        let cur=0;
        const rowAfter=(label,n)=>{
          const i=seg.indexOf(label,cur);
          if(i===-1)return null;
          const pos=i+label.length;
          const m=(seg.slice(pos).match(/\d+\.\d+/g)||[]).slice(0,n);
          if(m.length<n)return null;
          cur=pos;
          return m.map(Number);
        };
        const nigeRow=rowAfter("逃し",2);
        const sashiRow=rowAfter("差し",6);
        const makuriRow=rowAfter("捲り",6);
        const mzRow=rowAfter("捲り差し",6);
        if(!nigeRow&&!sashiRow&&!makuriRow)return null;
        return{
          nige:nigeRow?nigeRow[0]:null,nigashi:nigeRow?nigeRow[1]:null,
          sasare:sashiRow?sashiRow[0]:null,sashi:sashiRow?sashiRow.slice(1):null,
          makurare:makuriRow?makuriRow[0]:null,makuri:makuriRow?makuriRow.slice(1):null,
          makuraresashi:mzRow?mzRow[0]:null,makurizashi:mzRow?mzRow.slice(1):null,
        };
      };
      const kimIdx=text.indexOf("決まり手");
      let kim=null;
      if(kimIdx!==-1){
        const i6=text.indexOf("直近6ヶ月",kimIdx);
        const i1=text.indexOf("直近1年",kimIdx);
        const seg6=i6!==-1?text.slice(i6,i1!==-1?i1:text.length):null;
        const seg1=i1!==-1?text.slice(i1):null;
        const k6=parseKim(seg6),k1=parseKim(seg1);
        if(k6||k1)kim={"直近6ヶ月":k6,"直近1年":k1};
      }
      let kcount=null;
      const countIdx=text.indexOf("決まり手数");
      const countSeg6start=text.indexOf("直近6ヶ月",countIdx!==-1?countIdx:0);
      if(countSeg6start!==-1){
        const countSeg=text.slice(countSeg6start);
        const parseCountRow=(seg,names)=>{
          for(const name of names){
            const idx=seg.indexOf(name);
            if(idx===-1)continue;
            const after=seg.slice(idx+name.length);
            const re=/(\d+)|[-−ー]/g;
            const vals=[];let m;
            while(vals.length<6&&(m=re.exec(after))){
              vals.push(/[-−ー]/.test(m[0])?null:Number(m[0]));
            }
            if(vals.length===6)return vals;
          }
          return null;
        };
        const cNige=parseCountRow(countSeg,["逃げ","逃し"]);
        const cSashi=parseCountRow(countSeg,["差し"]);
        const cMakuri=parseCountRow(countSeg,["捲り"]);
        const cMakurizashi=parseCountRow(countSeg,["捲差","捲り差し"]);
        if(cNige||cSashi||cMakuri||cMakurizashi){
          kcount={nige:cNige,sashi:cSashi,makuri:cMakuri,makurizashi:cMakurizashi};
        }
      }
      if(!nige&&!kim&&!kcount){setPMsg("kimari","逃げシミュレーション・決まり手・決まり手数が見つかりません");return;}
      if(nige)setNigeSim(nige);
      if(kim)setKimari(kim);
      if(kcount)setKimariCount(kcount);
      const got=[nige?"逃げシミュ":null,kim?"決まり手":null,kcount?"決まり手数":null].filter(Boolean).join("・");
      setPMsg("kimari",`✓ ${got}を読み取りました`);
    }catch(e){setPMsg("kimari","解析に失敗しました");}
  };

  const PANELS={
    st:{title:"📋 平均ST",help:"基本情報の平均ST表（今期〜F持）をコピペ。",parse:parseStPaste},
    racer:{title:"📋 選手成績",help:"枠別情報の 1着率〜3連対率 をコピペ。",parse:parseRacer},
    kimari:{title:"📋 決まり手/逃げ",help:"枠別情報の逃げシミュレーション・決まり手・決まり手数をまとめてコピペ。",parse:parseKimari},
    motor:{title:"📋 モーター",help:"モータ情報の番号〜3連対率をコピペ。",parse:parseMotor},
    tenji:{title:"📋 展示タイム",help:"直前情報の進入〜チルトをコピペ。",parse:parseTenji},
  };

  const result=useMemo(()=>{
    if(!venue)return null;
    const vw=VENUE_WEIGHTS[venue]??{tenji:1.0,isshu:1.0,mawari:1.0,chokusen:1.0};
    const sums={};
    for(let b=1;b<=6;b++){
      const{tenji,isshu,mawari,chokusen}=inputs[b];
      let sum=0;
      const vals={tenji:parseFloat(tenji),isshu:parseFloat(isshu),mawari:parseFloat(mawari),chokusen:parseFloat(chokusen)};
      for(const k of["tenji","isshu","mawari","chokusen"]){
        if(vw[k]===0)continue;
        if(isNaN(vals[k]))return null;
        sum+=vals[k]*vw[k];
      }
      sums[b]=sum;
    }
    const avg=Object.values(sums).reduce((a,b)=>a+b,0)/6;
    const base=VENUES[venue];
    const rows=[];
    for(let b=1;b<=6;b++){
      const diff=avg-sums[b];
      const course=courses[b];
      const adj=lookup(venue,course,diff);
      const baseRate=base[course-1];
      const windAdj=+(WIND[wind][course-1]-WIND["無風"][course-1]).toFixed(1);
      const final1=baseRate+adj.w1+windAdj;
      const rW1=racerStats?.win1?.[racerCat]?.[b-1]??null;
      const rR2=racerStats?.ren2?.[racerCat]?.[b-1]??null;
      const rR3=racerStats?.ren3?.[racerCat]?.[b-1]??null;
      const racerR1final=rW1!=null?rW1+adj.w1:null;
      const racerR2final=rR2!=null?rR2+adj.w1+adj.w2:null;
      const racerR3final=rR3!=null?rR3+adj.top3:null;
      rows.push({boat:b,course,sum:sums[b],diff,baseRate,windAdj,final1,racerW1:rW1,racerR2:rR2,racerR3:rR3,racerR1final,racerR2final,racerR3final,...adj});
    }
    const hasRacer=rows.some(r=>r.racerR1final!=null||r.racerR3final!=null);
    const sortKey=r=>r.racerR1final??(r.racerR3final!=null?r.racerR3final-100:-999);
    const racerRank=hasRacer?[...rows].sort((a,b)=>sortKey(b)-sortKey(a)):null;
    const dup=new Set(Object.values(courses)).size!==6;
    return{avg,rows,racerRank,dup};
  },[inputs,venue,wind,courses,racerStats,racerCat]);

  const slit=useMemo(()=>{
    const rows=[];
    for(let b=1;b<=6;b++){
      if(sts[b]==="")return null;
      const baseSt=parseFloat(sts[b]);
      let st=baseSt,mark=null;
      if(fHold[b]){if(fSts[b]!==""){st=parseFloat(fSts[b]);mark="F";}else{mark="F?";}}
      rows.push({boat:b,course:courses[b],st,mark});
    }
    rows.sort((a,b)=>a.course-b.course);
    return rows;
  },[sts,fHold,fSts,courses]);

  const aiEval=useMemo(()=>{
    if(!result)return null;
    const rows=result.rows;
    const effSt={};
    for(let b=1;b<=6;b++){
      if(sts[b]!=="")effSt[b]=fHold[b]&&fSts[b]!==""?parseFloat(fSts[b]):parseFloat(sts[b]);
    }
    const stVals=Object.values(effSt);
    const stAvg=stVals.length>=2?stVals.reduce((a,c)=>a+c,0)/stVals.length:null;
    const motorVals=Object.values(motors).filter(m=>m&&m.ren2!=null).map(m=>m.ren2);
    const motorAvg=motorVals.length>=2?motorVals.reduce((a,c)=>a+c,0)/motorVals.length:null;
    const motorTop2=new Set(Object.entries(motors).filter(([,m])=>m&&m.ren2!=null).sort((a,b)=>b[1].ren2-a[1].ren2).slice(0,2).map(([b])=>Number(b)));
    const r1Vals=rows.filter(r=>r.racerR1final!=null).map(r=>r.racerR1final);
    const r1Avg=r1Vals.length>=2?r1Vals.reduce((a,c)=>a+c,0)/r1Vals.length:null;
    const r2Vals=rows.filter(r=>r.racerR2final!=null).map(r=>r.racerR2final);
    const r2Avg=r2Vals.length>=2?r2Vals.reduce((a,c)=>a+c,0)/r2Vals.length:null;
    const r3Vals=rows.filter(r=>r.racerR3final!=null).map(r=>r.racerR3final);
    const r3Avg=r3Vals.length>=2?r3Vals.reduce((a,c)=>a+c,0)/r3Vals.length:null;
    const evals=rows.map(r=>{
      const m=motors[r.boat];
      const crit={
        racer:(r.racerR1final==null&&r.racerR2final==null&&r.racerR3final==null)?null
          :(r.racerR1final!=null&&r1Avg!=null&&r.racerR1final>=r1Avg+1)||(r.racerR2final!=null&&r2Avg!=null&&r.racerR2final>=r2Avg+2)||(r.racerR3final!=null&&r3Avg!=null&&r.racerR3final>=r3Avg+3),
        time:r.diff>=0.1,
        motor:m&&(m.ren2!=null||m.ren3!=null)?(motorTop2.has(r.boat)||(m.ren3!=null&&m.ren3>=60)):null,
        wind:wind==="無風"?null:r.windAdj>=0.5,
      };
      const goods=Object.values(crit).filter(v=>v===true).length;
      const mark=goods>=3?"◎":goods===2?"○":goods===1?"△":"✕";
      const warns=[],plus=[],infos=[];
      if(fHold[r.boat])warns.push("F持ち注意");
      if(stAvg!=null&&effSt[r.boat]!=null&&effSt[r.boat]-stAvg>=0.03)warns.push("ST遅め注意");
      if(crit.motor===true&&r.diff<0)warns.push("タイム不発でもモーター良・警戒");
      if(tilts[r.boat]!==""&&parseFloat(tilts[r.boat])>=1.0)warns.push("チルト跳ね・伸び警戒");
      if(stAvg!=null&&effSt[r.boat]!=null&&stAvg-effSt[r.boat]>=0.03)plus.push("スリット先行候補");
      if(r.racerR3final!=null&&r3Avg!=null){
        const v3=r.racerR3final.toFixed(1);
        const lo1=r.racerR1final!=null&&r1Avg!=null&&r.racerR1final<=r1Avg-1;
        const hi3=r.racerR3final>=r3Avg+3;
        const lo3=r.racerR3final<=r3Avg-5;
        if(lo1&&hi3){if(crit.time===true)plus.push(`1着率は低めだが3連対率${v3}%＋タイム良で2・3着残し有力`);else infos.push(`1着率低めも3連対率${v3}%で3着残しの目`);}
        if(lo3&&crit.time===false)infos.push(`3連対率${v3}%と低調で軽視も`);
      }
      if(r.racerR2final!=null&&r2Avg!=null&&r.racerR2final>=r2Avg+3&&crit.time===true)plus.push(`2連対率${r.racerR2final.toFixed(1)}%上位で相手筆頭級`);
      if(nigeSim&&r.boat>=2){const v2=nigeSim.second?.[r.boat-2];if(v2!=null&&v2>=30)plus.push(`逃がし2着${v2}%（1-${r.boat}本線級）`);}
      if(r3Avg!=null&&r.racerR3final!=null&&r.racerR3final-r3Avg<=-5)warns.push("3連対率低く紐でも過信禁物");
      const score=goods*10+(r.racerR1final!=null&&r1Avg!=null?(r.racerR1final-r1Avg)*0.3:0)+r.diff*5+(m&&m.ren2!=null&&motorAvg!=null?(m.ren2-motorAvg)*0.1:0)+r.windAdj*0.5+r.final1*0.05;
      return{...r,crit,goods,mark,warns,plus,infos,score};
    });
    const km=kimari?kimari[kimariPeriod]:null;
    if(km){
      const b1=evals.find(r=>r.boat===1);
      if(b1){
        if(km.nige!=null&&km.nige>=40)b1.plus.push(`逃げ率${km.nige}%と高水準`);
        else if(km.nige!=null&&km.nige<=25)b1.warns.push(`逃げ率${km.nige}%と低調`);
        const types=[{key:"sashi",name:"差し",def:km.sasare,defName:"差され"},{key:"makuri",name:"捲り",def:km.makurare,defName:"捲られ"},{key:"makurizashi",name:"捲り差し",def:km.makuraresashi,defName:"捲られ差"}];
        for(const t of types){
          const arr=km[t.key];
          if(!arr||t.def==null)continue;
          let mb=0,mv=-1;
          arr.forEach((v,i)=>{if(v!=null&&v>mv){mv=v;mb=i+2;}});
          const atk=evals.find(r=>r.boat===mb);
          if(t.def>=15&&mv>=15){
            b1.warns.push(`${t.defName}${t.def}%×${mb}号艇の${t.name}${mv}%で要警戒`);
            if(atk)atk.plus.push(`${t.name}${mv}%で1号艇を脅かす`);
          }
        }
      }
    }
    const ranked=[...evals].sort((a,b)=>b.score-a.score);
    ranked.forEach((r,i)=>{r.rankPos=i+1;});
    const maxG=Math.max(...evals.map(r=>r.goods));
    const topN=evals.filter(r=>r.goods===maxG).length;
    let badge,badgeColor;
    if(maxG>=3&&topN===1){badge="本命";badgeColor="#2e9e6b";}
    else if(maxG>=3&&topN===2){badge="やや本命";badgeColor="#5a9e2e";}
    else if(maxG>=2&&topN===1){badge="やや本命";badgeColor="#5a9e2e";}
    else if(maxG>=2){badge="混戦";badgeColor="#b8893d";}
    else{badge="大混戦・波乱含み";badgeColor="#b3463f";}
    const usedData=["展示タイム",motorAvg!=null?"モーター":null,wind!=="無風"?"風":null,stAvg!=null?"平均ST(注意判定)":null,kimari?`決まり手(${kimariPeriod})`:null,nigeSim?"逃げシミュ":null,"場別コース率(参考)"].filter(Boolean);
    return{ranked,badge,badgeColor,usedData};
  },[result,sts,fHold,fSts,motors,tilts,wind,racerCat,kimari,kimariPeriod,nigeSim]);

  const kimariCountByBoat=useMemo(()=>{
    if(!kimariCount||!result)return null;
    return result.rows.map(r=>{
      const ci=r.course-1;
      const nige=kimariCount.nige?.[ci]??null;
      const sashi=kimariCount.sashi?.[ci]??null;
      const makuri=kimariCount.makuri?.[ci]??null;
      const makurizashi=kimariCount.makurizashi?.[ci]??null;
      const total=[nige,sashi,makuri,makurizashi].reduce((s,v)=>s+(v??0),0);
      return{boat:r.boat,course:r.course,nige,sashi,makuri,makurizashi,total};
    });
  },[kimariCount,result]);

  const fmt=(n,d=2)=>n.toFixed(d);
  const sign=n=>n>0?`+${n}`:`${n}`;
  const col=n=>n>0?"#5dd39e":n<0?"#ff8a80":"#9db5cc";
  const pill=v=>(
    <span style={{display:"inline-block",minWidth:44,textAlign:"center",padding:"5px 7px",borderRadius:8,fontWeight:800,fontSize:12,background:v>0?"rgba(46,158,107,0.22)":v<0?"rgba(217,75,67,0.22)":"#1d3149",color:v>0?"#5dd39e":v<0?"#ff8a80":"#9db5cc"}}>{sign(v)}%</span>
  );
  const numCell=(v,highlight=false)=>(
    <td style={{padding:"8px 10px",textAlign:"center",fontWeight:highlight?800:600,color:v!=null?(highlight?"#fff":"#c8d8e8"):"#4a5d70"}}>{v!=null?v:"―"}</td>
  );
  const LaneCircle=({b,small=false})=>(
    <span style={{display:"inline-flex",width:small?22:26,height:small?22:26,borderRadius:small?5:6,background:LANE[b].bg,color:LANE[b].fg,alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:small?12:14,border:b===1?"1px solid #ccc":"none",flexShrink:0}}>{b}</span>
  );

  return(
    <div style={{minHeight:"100vh",background:"#0e1b2c",color:"#e8eef5",fontFamily:"'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif",padding:"16px 12px 48px"}}>
      <div style={{maxWidth:760,margin:"0 auto"}}>
        <h2 style={{margin:"0 0 16px",fontSize:18,fontWeight:800,color:"#fff"}}>🚤 ボートレース予測</h2>

        {/* 場選択 */}
        <div style={{fontSize:11,color:"#7da3c8",marginBottom:6}}>開催場を選択</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:12}}>
          {Object.keys(VENUES).map(v=>(
            <button key={v} onClick={()=>setVenue(v)} style={{padding:"8px 4px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700,border:venue===v?"2px solid #5a87b8":"1px solid #2c4762",background:venue===v?"#2c4762":"#16273c",color:venue===v?"#fff":"#9db5cc",textAlign:"center"}}>{v}</button>
          ))}
        </div>
        {venue&&(
          <>
            <div style={{fontSize:12,fontWeight:700,color:"#e8eef5",marginBottom:6,paddingLeft:8,borderLeft:"3px solid #3d7ab8"}}>各コースの平均1着率</div>

                <div key={f.key}>

                    </select>
                  </div>

                <div style={{minWidth:72}}>
                  <div style={{fontSize:10,color:"#7da3c8",marginBottom:2}}>体重(kg)</div>

                </div>
              </div>
              {motors[b]&&(

                  {racerStats.ren2?.[racerCat]?.[b-1]!=null&&<span>2連 <b style={{color:"#fff"}}>{racerStats.ren2[racerCat][b-1]}%</b></span>}

            <div style={{textAlign:"center",padding:"20px 16px",borderRadius:10,border:"1px dashed #2c4762",color:"#7da3c8",fontSize:12}}>6艇すべての平均STを選択するとスリット隊形を表示します</div>
          ):(
            <div style={{background:"#16273c",borderRadius:10,padding:"14px 12px",position:"relative"}}>
              <div style={{position:"absolute",top:10,bottom:10,right:56,width:2,background:"#d96b63",opacity:0.8}}/>

                  const pct=Math.max(0,Math.min(1,(0.25-r.st)/0.25));

                        </div>
                      </div>
                      <span style={{width:34,fontSize:11,color:"#9db5cc",textAlign:"right",flexShrink:0}}>.{r.st.toFixed(2).split(".")[1]}</span>

            </div>
          )}
        </div>

        {/* 展示タイム一覧 */}

              <thead>
                <tr style={{color:"#7da3c8",fontSize:11}}>
                  {["艇","周回","周り足","直線","展示"].map(h=>(
                    <th key={h} style={{padding:"6px 10px",textAlign:"center",borderBottom:"1px solid #2c4762",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {(()=>{
                  const keys=["isshu","mawari","chokusen","tenji"];
                  const ranks=keys.map(k=>{
                    const vals=[1,2,3,4,5,6].map(b=>parseFloat(inputs[b][k])).filter(v=>!isNaN(v));
                    const sorted=[...new Set(vals)].sort((a,b)=>a-b);
                    return{first:sorted[0],second:sorted[1]};
                  });
                  return[1,2,3,4,5,6].map(b=>{
                    const{tenji,isshu,mawari,chokusen}=inputs[b];
                    const isEmpty=[tenji,isshu,mawari,chokusen].every(v=>v==="");
                    return(
                      <tr key={b} style={{borderBottom:"1px solid #1d3149",opacity:isEmpty?0.35:1}}>
                        <td style={{padding:"8px 10px",textAlign:"center"}}><LaneCircle b={b}/></td>
                        {[isshu,mawari,chokusen,tenji].map((v,i)=>{
                          const num=parseFloat(v);
                          const isFirst=!isNaN(num)&&num===ranks[i].first;
                          const isSecond=!isNaN(num)&&num===ranks[i].second;
                          const bg=isFirst?"rgba(217,48,37,0.55)":isSecond?"rgba(249,197,19,0.35)":"transparent";

                              <span style={{display:"inline-block",minWidth:48,padding:"4px 8px",borderRadius:6,background:bg,fontWeight:700,color}}>{v||"―"}</span>

                      </tr>
                    );
                  });
                })()}
              </tbody>
            </table>
          </div>

        {!result?(

          </div>
        ):(
          <>
            <div style={{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap",marginBottom:10}}>

                <thead>
                  <tr style={{color:"#7da3c8",fontSize:11}}>
                    {["艇","1着率","2着率","3着率","3連対率","合計","差"].map((h,i)=>(
                      <th key={h} style={{padding:"6px 8px",textAlign:i===0?"left":"center",borderBottom:"1px solid #2c4762",whiteSpace:"nowrap"}}>{h}</th>
                    ))}

                <tbody>
                  {result.rows.map(r=>(
                    <tr key={r.boat} style={{borderBottom:"1px solid #1d3149"}}>
                      <td style={{padding:"9px 8px"}}>

                      <td style={{padding:"9px 6px",textAlign:"center"}}>{pill(r.w3)}</td>
                      <td style={{padding:"9px 6px",textAlign:"center"}}>{pill(r.top3)}</td>
                      <td style={{padding:"9px 8px",textAlign:"center",fontWeight:800,color:"#fff"}}>{fmt(r.sum)}</td>

                    </tr>

                </tbody>
              </table>
            </div>

            {(result.racerRank||kimariCountByBoat)&&(
              <div style={{marginBottom:28}}>

                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead>
                      <tr style={{color:"#7da3c8",fontSize:11}}>
                        <th style={{padding:"6px 10px",textAlign:"left",borderBottom:"1px solid #2c4762",whiteSpace:"nowrap"}}>艇</th>

                          <th style={{padding:"6px 10px",textAlign:"center",borderBottom:"1px solid #2c4762",whiteSpace:"nowrap"}}>予想1着率</th>
                          <th style={{padding:"6px 10px",textAlign:"center",borderBottom:"1px solid #2c4762",whiteSpace:"nowrap"}}>予想2着率</th>
                          <th style={{padding:"6px 10px",textAlign:"center",borderBottom:"1px solid #2c4762",whiteSpace:"nowrap"}}>予想3着率</th>

                          <th style={{padding:"6px 10px",textAlign:"center",borderBottom:"1px solid #2c4762",whiteSpace:"nowrap"}}>差し</th>
                          <th style={{padding:"6px 10px",textAlign:"center",borderBottom:"1px solid #2c4762",whiteSpace:"nowrap"}}>捲り</th>
                          <th style={{padding:"6px 10px",textAlign:"center",borderBottom:"1px solid #2c4762",whiteSpace:"nowrap"}}>捲差</th>

                      </tr>
                    </thead>
                    <tbody>
                      {result.rows.map(r=>{

                            <td style={{padding:"8px 10px"}}>
                              <LaneCircle b={r.boat}/>
                              {r.course!==r.boat&&<span style={{fontSize:10,color:"#f9c513",marginLeft:4}}>{r.course}C</span>}
                            </td>
                            {kimariCountByBoat&&kc?<>
                              <td style={{padding:"8px 10px",textAlign:"center",fontWeight:800,color:"#fff"}}>
                                {kc.total}{racerRaceCount?<span style={{color:"#7da3c8",fontWeight:400}}>／{racerRaceCount[r.boat-1]??"―"}</span>:""}
                              </td>
                            </>:kimariCountByBoat?<td style={{padding:"8px 10px",textAlign:"center",color:"#4a5d70"}}>―</td>:null}
                            {result.racerRank&&<>
                              {numCell(r.racerR1final!=null?`${fmt(r.racerR1final,1)}%`:null)}
                              {numCell(r.racerR2final!=null?`${fmt(r.racerR2final,1)}%`:null)}
                              {numCell(r.racerR3final!=null?`${fmt(r.racerR3final,1)}%`:null)}
                            </>}
                            {kimariCountByBoat&&kc?<>
                              <td style={{padding:"8px 10px",textAlign:"center",borderLeft:"1px solid #2c4762",color:kc.nige!=null?"#c8d8e8":"#4a5d70"}}>{kc.nige??"―"}</td>
                              <td style={{padding:"8px 10px",textAlign:"center",color:kc.sashi!=null?"#c8d8e8":"#4a5d70"}}>{kc.sashi??"―"}</td>
                              <td style={{padding:"8px 10px",textAlign:"center",color:kc.makuri!=null?"#c8d8e8":"#4a5d70"}}>{kc.makuri??"―"}</td>
                              <td style={{padding:"8px 10px",textAlign:"center",color:kc.makurizashi!=null?"#c8d8e8":"#4a5d70"}}>{kc.makurizashi??"―"}</td>
                            </>:kimariCountByBoat?<td colSpan={4} style={{padding:"8px 10px",textAlign:"center",color:"#4a5d70",borderLeft:"1px solid #2c4762"}}>―</td>:null}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* 場平均1着率 */}
            <div style={{fontSize:11,letterSpacing:"0.2em",color:"#7da3c8",marginBottom:8}}>場平均で見る1着率</div>
            <div style={{display:"grid",gap:6,marginBottom:28}}>
              {[...result.rows].sort((a,b)=>(b.baseRate+b.windAdj)-(a.baseRate+a.windAdj)).map((r,i)=>{
                const v=r.baseRate+r.windAdj;
                const max=Math.max(...result.rows.map(x=>x.baseRate+x.windAdj),1);
                return(
                  <div key={r.boat} style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{width:18,fontSize:12,color:"#7da3c8"}}>{i+1}.</span>
                    <LaneCircle b={r.boat}/>
                    <div style={{flex:1}}>
                      <div style={{height:18,background:"#16273c",borderRadius:4,overflow:"hidden"}}><div style={{width:`${Math.max((v/max)*100,0)}%`,height:"100%",background:"#3d7ab8"}}/></div>
                      <div style={{fontSize:10,color:"#7da3c8",marginTop:2}}>
                        {r.course}コース ／ 場平均 {r.baseRate}%
                        {r.windAdj!==0&&<> 風<span style={{color:col(r.windAdj)}}>{sign(r.windAdj)}%</span></>}
                      </div>
                    </div>
                    <span style={{width:56,textAlign:"right",fontWeight:800,fontSize:16}}>{fmt(v,1)}%</span>
                  </div>
                );
              })}
            </div>

            {/* 逃げシミュ */}
            {nigeSim&&(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:11,letterSpacing:"0.2em",color:"#7da3c8",marginBottom:8}}>逃げシミュレーション</div>
                {(()=>{
                  const byBoat=Object.fromEntries(result.rows.map(r=>[r.boat,r]));
                  const adjNige=byBoat[1]?nigeSim.nigeRate+byBoat[1].w1:null;
                  return(
                    <>
                      <div style={{background:"#16273c",borderRadius:10,padding:"10px 12px",marginBottom:8,fontSize:12,color:"#9db5cc",display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
                        <LaneCircle b={1}/>
                        <span>1着 <b style={{color:"#fff"}}>{nigeSim.win1}%</b></span>
                        <span>逃げ <b style={{color:"#fff"}}>{nigeSim.nigeRate}%</b></span>
                        {adjNige!=null&&<span>→ 補正後 <b style={{color:adjNige>=(nigeSim.nigeRate)?"#5dd39e":"#ff8a80",fontSize:14}}>{fmt(adjNige,1)}%</b></span>}
                      </div>
                      <div style={{overflowX:"auto"}}>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:480}}>
                          <thead>
                            <tr style={{color:"#7da3c8",fontSize:10}}>
                              {["艇","逃がし2着","補正後","逃がし3着","補正後","1-X出目"].map((h,i)=><th key={h} style={{padding:"5px 6px",textAlign:i===0?"left":"center",borderBottom:"1px solid #2c4762",whiteSpace:"nowrap"}}>{h}</th>)}
                            </tr>
                          </thead>
                          <tbody>
                            {[2,3,4,5,6].map(b=>{
                              const i=b-2,r=byBoat[b];
                              const s2=nigeSim.second?.[i],s3=nigeSim.third?.[i],dm=nigeSim.deme?.[i];
                              const a2=s2!=null&&r?s2+r.w2:null;
                              const a3=s3!=null&&r?s3+r.w3:null;
                              return(
                                <tr key={b} style={{borderBottom:"1px solid #1d3149"}}>
                                  <td style={{padding:"7px 6px"}}><LaneCircle b={b} small/></td>
                                  <td style={{padding:"7px 6px",textAlign:"center",color:"#e8eef5"}}>{s2!=null?`${s2}%`:"−"}</td>
                                  <td style={{padding:"7px 6px",textAlign:"center",fontWeight:800,color:a2==null?"#4a5d70":a2>=(s2??0)?"#5dd39e":"#ff8a80"}}>{a2!=null?`${fmt(a2,1)}%`:"−"}</td>
                                  <td style={{padding:"7px 6px",textAlign:"center",color:"#e8eef5"}}>{s3!=null?`${s3}%`:"−"}</td>
                                  <td style={{padding:"7px 6px",textAlign:"center",fontWeight:800,color:a3==null?"#4a5d70":a3>=(s3??0)?"#5dd39e":"#ff8a80"}}>{a3!=null?`${fmt(a3,1)}%`:"−"}</td>
                                  <td style={{padding:"7px 6px",textAlign:"center",color:"#9db5cc"}}>{dm!=null?`1-${b} ${dm}%`:"−"}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </>
                  );
                })()}
              </div>
            )}

            {/* 総合AI評価 */}
            {aiEval&&(
              <div style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{fontSize:11,letterSpacing:"0.2em",color:"#7da3c8"}}>総合AI評価</span>
                  <span style={{fontSize:11,fontWeight:800,padding:"3px 10px",borderRadius:999,background:aiEval.badgeColor,color:"#fff"}}>{aiEval.badge}</span>
                </div>
                <div style={{display:"grid",gap:8}}>
                  {aiEval.ranked.map(r=>(
                    <div key={r.boat} style={{background:"#16273c",borderRadius:10,padding:"10px 12px",border:r.mark==="◎"?"1px solid #f9c513":r.rankPos===1?"1px solid #3d7ab8":"1px solid transparent"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        <span style={{fontSize:12,color:"#7da3c8",width:18}}>{r.rankPos}.</span>
                        <span style={{fontSize:20,fontWeight:800,width:26,color:r.mark==="◎"?"#f9c513":r.mark==="○"?"#5dd39e":r.mark==="△"?"#e8eef5":"#7a8da0"}}>{r.mark}</span>
                        <LaneCircle b={r.boat}/>
                        <span style={{fontSize:11,color:"#7da3c8"}}>{r.course}C進入</span>
                        <span style={{fontSize:11,color:"#7da3c8",marginLeft:"auto"}}>良 {r.goods}/4 ｜ 参考 {fmt(r.final1,1)}%</span>
                      </div>
                      {(()=>{
                        const max=Math.max(...aiEval.ranked.map(x=>x.score));
                        const min=Math.min(...aiEval.ranked.map(x=>x.score));
                        const w=Math.max(4,((r.score-min)/Math.max(max-min,0.01))*100);
                        return <div style={{height:6,background:"#0e1b2c",borderRadius:3,overflow:"hidden",marginTop:8}}><div style={{width:`${w}%`,height:"100%",background:r.rankPos===1?"#f9c513":r.rankPos<=3?"#3d7ab8":"#2c4762"}}/></div>;
                      })()}
                      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:8}}>
                        {[["枠別成績",r.crit.racer],["展示タイム",r.crit.time],["モーター",r.crit.motor],["風",r.crit.wind]].map(([label,v])=>(
                          <span key={label} style={{fontSize:10,fontWeight:800,padding:"4px 8px",borderRadius:6,background:v===true?"rgba(46,158,107,0.22)":v===false?"#1d3149":"transparent",color:v===true?"#5dd39e":v===false?"#7a8da0":"#4a5d70",border:v===null?"1px dashed #2c4762":"1px solid transparent"}}>{v===true?"✓":v===false?"✗":"−"} {label}</span>
                        ))}
                      </div>
                      {(r.warns.length>0||r.plus.length>0||r.infos.length>0)&&(
                        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:6}}>
                          {r.warns.map(w=><span key={w} style={{fontSize:10,fontWeight:800,padding:"4px 8px",borderRadius:6,background:"rgba(249,197,19,0.15)",color:"#f9c513"}}>⚠ {w}</span>)}
                          {r.plus.map(p=><span key={p} style={{fontSize:10,fontWeight:800,padding:"4px 8px",borderRadius:6,background:"rgba(61,122,184,0.2)",color:"#7db4e8"}}>＋ {p}</span>)}
                          {r.infos.map(info=><span key={info} style={{fontSize:10,fontWeight:700,padding:"4px 8px",borderRadius:6,background:"#1d3149",color:"#9db5cc"}}>○ {info}</span>)}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
                <div style={{fontSize:10,color:"#7da3c8",marginTop:10,lineHeight:1.6}}>
                  判定: 枠別成績・展示タイム・モーター・風 の4項目中、良が3つ以上＝◎／2つ＝○／1つ＝△／0＝✕。使用データ: {aiEval.usedData.join("・")}
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
